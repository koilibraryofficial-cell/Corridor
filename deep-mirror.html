<head>

<title>The Deep Mirror — Kingdom of Inner Light</title>
<style>
  /* ===== silence the Squarespace frame on this page ===== */
  #header, .header, header#header, .sqs-announcement-bar-dropzone,
  #footer-sections, footer.sections, .sqs-cookie-banner-v2{display:none !important}
  #page, #siteWrapper, .content-wrapper, article, section.page-section,
  .content, .fluid-engine, .sqs-block, .sqs-block-code{
    padding:0 !important; margin:0 !important; max-width:none !important}
  section.page-section{min-height:0 !important}
  .fluid-engine{display:block !important}
  .sqs-block-code{display:block !important; width:100% !important}
  h1{color:#EFE7D8 !important; font-family:"Palatino Linotype",Palatino,Georgia,serif !important}
  .frame .sub{color:#B7A2EE !important}
  .frame .body{color:#EFE7D8 !important}
  .frame .dim{color:#938BA6 !important}
  .frame p, .frame div{font-family:"Palatino Linotype",Palatino,Georgia,serif}

  :root{
    --ink:#12101A; --ink2:#1A1726; --cream:#EFE7D8; --gold:#C9A44C;
    --violet:#9B7FD4; --dim:#938BA6; --rule:#3A3450;
  }
  *{margin:0;padding:0;box-sizing:border-box}

  }
  .frame{width:100%; max-width:560px; text-align:center; position:relative; z-index:2;
    margin:0 auto; padding:8vh 0 12vh;}
  .veil{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 110%, #1A1424 0%, #12101A 55%, #0B0A12 100%)}
  .ember{position:fixed;border-radius:50%;background:var(--gold);pointer-events:none;z-index:1;
    animation:erise linear infinite, eglow 2.2s ease-in-out infinite}
  @keyframes erise{from{transform:translateY(10vh)}to{transform:translateY(-112vh)}}
  @keyframes eglow{0%,100%{opacity:.12}50%{opacity:.6}}
  .lensglow{position:fixed;left:50%;top:46%;width:min(120vw,760px);height:min(120vw,760px);
    transform:translate(-50%,-50%) scale(1);border-radius:50%;pointer-events:none;z-index:1;
    background:radial-gradient(circle, rgba(155,127,212,.10) 0%, rgba(155,127,212,.03) 45%, rgba(155,127,212,0) 70%);
    opacity:.6; transition:background 2.4s ease}

  .kicker{
    font-family:Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:.28em;
    color:var(--gold); text-transform:uppercase; margin-bottom:14px;
  }
  .rule{width:130px;height:1px;margin:0 auto 26px;position:relative;opacity:.9;
    background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .rule:after{content:"";position:absolute;left:50%;top:50%;width:6px;height:6px;
    transform:translate(-50%,-50%) rotate(45deg);background:var(--ink);

  h1{font-size:32px; font-weight:400; letter-spacing:.02em; margin-bottom:14px}

  .center{text-align:center}
  .dim{color:var(--dim); font-size:13px; line-height:1.6}
  button.gate-btn{
    font-family:Helvetica,Arial,sans-serif; letter-spacing:.18em; text-transform:uppercase;

  }
  button.gate-btn:hover{transform:translateY(-1px); box-shadow:0 0 24px rgba(201,164,76,.35)}
  button.gate-btn:focus-visible{outline:2px solid var(--cream); outline-offset:3px}
  button.gate-btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}

  .qbar{font-family:Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:.3em;

  .pbar{width:100%;height:3px;background:var(--rule);margin:0 auto 30px;position:relative;overflow:hidden}
  .pbar .fill{position:absolute;left:0;top:0;bottom:0;background:var(--gold);
    transition:width .5s ease;box-shadow:0 0 12px rgba(201,164,76,.6)}
  .question{font-size:22px; line-height:1.5; margin-bottom:8px; color:var(--cream)}

  /* ===== THE SPARK — a door for the stuck, invisible to the willing ===== */
  .spark{margin-top:14px;padding:16px 18px;text-align:left;border-left:2px solid var(--mvc,#9B7FD4);
    background:rgba(155,127,212,.06);animation:fadeUp .4s ease}
  .spark p{color:#CDBCF4 !important;font-style:italic;font-size:15px;line-height:1.6;margin-bottom:10px}

  /* ===== THE THRESHOLD — the door between rooms ===== */

    text-transform:uppercase;color:var(--dim);margin-bottom:8px}

  /* ===== THE GLANCE — the mirror answers every page ===== */
  .glancewrap{margin:26px auto 0;max-width:520px;min-height:90px}
  .glance p{font-style:italic;font-size:18px;line-height:1.7;color:#CDBCF4 !important;

  .gdots{font-size:22px;letter-spacing:.4em;color:var(--dim);animation:hintpulse 1.6s ease-in-out infinite}
  @keyframes hintpulse{0%,100%{opacity:.35}50%{opacity:.95}}

  /* ===== THE WOVEN READING — the rite ===== */

  .rsec{opacity:0;animation:rsecin 1.1s ease forwards;animation-delay:var(--rd,0s);margin-bottom:6px;position:relative;z-index:2}

  .rlight p{color:#EFE7D8 !important}
  .rlight .rtitle{color:#E8C46A}
  .rshadow p{color:#B8B2C6 !important}
  .rshadow .rtitle{color:#938BA6;text-shadow:0 0 14px rgba(147,139,166,.4)}
  .rdoor{border:1px solid rgba(201,164,76,.55);border-radius:6px;padding:20px 22px 18px;
    margin:8px 0 4px;background:linear-gradient(160deg, rgba(201,164,76,.08), rgba(18,16,26,.4));
    box-shadow:0 0 26px rgba(201,164,76,.18), inset 0 1px 0 rgba(239,231,216,.25);
    position:relative;overflow:hidden}
  .rdoor:after{content:"";position:absolute;top:0;bottom:0;width:30%;left:-40%;

  @keyframes doorshine{0%{left:-40%}60%{left:120%}100%{left:120%}}
  .rwalk{display:inline-block;margin-top:12px;font-family:Helvetica,Arial,sans-serif;
    font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);
    text-decoration:none;border-bottom:1px solid rgba(201,164,76,.55);padding-bottom:2px}
  .rwalk:hover{text-shadow:0 0 12px rgba(201,164,76,.6)}

  /* ===== WHY DEEPER — the bridge for pilgrims at the gate ===== */
  .whydeeper{margin-top:6px;text-align:left}
  .whydeeper .hook{color:#B7A2EE;font-style:italic;font-size:18px;line-height:1.6;
    text-align:center;text-shadow:0 0 22px rgba(155,127,212,.5);margin-bottom:18px}
  .whydeeper .placard{color:var(--gold);text-align:center;font-size:16px;line-height:1.7;
    margin:16px 0 6px;text-shadow:0 0 16px rgba(201,164,76,.3)}
  .whydeeper .nochase{color:var(--dim);text-align:center;font-size:14px;font-style:italic;
    margin-top:14px}

  textarea.deep{
    width:100%; min-height:170px; background:var(--ink2); border:1px solid var(--rule);

  }

    box-shadow:0 0 24px rgba(155,127,212,.25)}
  input.email{
    width:100%; background:var(--ink2); border:1px solid var(--rule); color:var(--cream);
    padding:14px 16px; font-size:15px; font-family:inherit; margin-top:8px;
  }
  input.email:focus{outline:none; border-color:var(--gold)}
  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
  /* ===== THE SPOKEN PAGE — how to speak instead of type ===== */
  .voicehelp{margin-top:14px;padding:14px 16px;text-align:left;border-left:2px solid var(--rule);
    background:rgba(147,139,166,.06);animation:fadeUp .4s ease}
  .voicehelp p{color:var(--dim) !important;font-size:13px;line-height:1.65;margin-bottom:8px}
  .voicehelp p strong{color:var(--cream);font-weight:normal}
  .voicehelp p:last-child{margin-bottom:0}
  .stage{animation:fadeUp .5s ease}
  @keyframes fadeUp{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
  .foot{margin-top:34px}
  a.dl{color:var(--dim);font-size:12px;text-decoration:underline}
  .threadbadge{position:fixed;left:12px;bottom:10px;z-index:5;
    font-family:Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:.18em;
    color:#C9A44C;text-transform:uppercase;pointer-events:none;
    text-shadow:0 0 10px rgba(201,164,76,.4);opacity:.85}
  input.thread{width:100%;max-width:300px;background:var(--ink2);border:1px solid var(--rule);
    color:var(--cream);padding:12px 14px;font-size:15px;font-family:Helvetica,Arial,sans-serif;
    letter-spacing:.12em;text-transform:uppercase;text-align:center;margin-top:12px}
  input.thread:focus{outline:none;border-color:var(--gold)}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important}
  }
</style>

<body>
<div class="veil"></div>
<div class="lensglow" id="lensglow"></div>
<div class="frame" id="app"></div>

<script>
/* ============ CONFIG ============ */
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxgsybTw7ejoZxxtjefgzpfs10D_xE_P248tC4jgL-UqLZ58Zo1xaDpSs_iuPmDFF_yyw/exec";
const MIRROR_URL  = "https://script.google.com/macros/s/AKfycbwcwMIPr9-VumbKwFz3ck8boN16zOjFCKjde3w45bapwTzi5uui4XVi3znvBGqodhqkXw/exec";
const DRAFT_KEY = "koil_deep_mirror_v2";
const LENS=(function(){
  try{
    const v=localStorage.getItem("koil_lens"); if(!v) return "";
    try{ const j=JSON.parse(v); return String(j.lens||j.name||j.dominant||"").slice(0,24); }
    catch(e){ return String(v).slice(0,24); }
  }catch(e){ return ""; }
})();
const GATE_REQUIRED = true; /* the door opens only with a thread code */
const MAXLEN = 2000; /* per answer */

/* ============ THE THIRTY-THREE ============ */
const QUESTIONS=[
"What is something you always find yourself wanting to do, even if you can't explain why?",
"Describe the last time you lost track of time. What were you doing?",
"What kind of people do you feel most alive around?",
"Tell me about one specific moment you felt completely yourself. Where were you, and who was there?",
"What kind of problem do you secretly wish someone would ask you to solve?",
"What rejection in your life taught you the most about yourself?",
"What do people often misunderstand or get wrong about who you truly are?",
"Can you remember the exact moment you realized the world wasn't fair? What happened?",
"What's a moment that changed you — and no one really saw it?",
"What's your first instinct when someone disrespects you?",
"Describe the last time you were completely overwhelmed. What did you actually do in the first hour?",
"Think of your last real conflict. Walk me through what you did, step by step.",
"What type of behavior in others instantly triggers a strong reaction in you?",
"What's one thing you can't stand watching people do?",
"Where does stress live in your body — and what does it do there?",
"What's a promise you've kept that nobody made you keep?",
"What's something sacred to you that most people don't value?",
"What would you protect — even if the whole world called you wrong?",
"What do people always seem to expect from you — that you wish they wouldn't?",
"What role do you usually end up playing in groups — and is it the one you actually want?",
"What compliments do you trust the most?",
"What are you often criticized for — but secretly proud of?",
"Who are you quietly envious of — and what exactly do they have?",
"What's something true about you that no one in your life currently knows?",
"What made you laugh so hard you couldn't stop? When did that last happen?",
"What emotion do you crave most but rarely admit?",
"If you had full permission to start over, what would you build?",
"If you could design a perfect world, what would be the first law?",
"What kind of person drains you just by being around?",
"In your experience, what do people pretend about most often?",
"What kind of advice instantly annoys you?",
"When you imagine being remembered by one person, who is it — and what do they say?",
"What's the most honest version of love you've ever imagined?"
];

/* ============ THE SPARKS — a scene to picture + words to begin with ============ */
const SPARKS=[
["Think of what you drift toward when nobody assigns you anything — the tab you open, the thing your hands start on their own.","Left alone, I always end up..."],
["Picture the last time hours vanished on you. Where were you, and what were your hands doing?","Time disappeared when I..."],
["Call up the last room where you didn't perform at all. Who was in it?","I breathe easier around people who..."],
["Find one scene — a kitchen, a car, a court, a 2 a.m. porch. The moment you weren't editing yourself.","There was this one time I..."],
["Imagine a friend calls at midnight needing exactly your kind of help. What's the problem they bring you?","I secretly wish someone would hand me..."],
["Go back to a door that closed — a job, a person, a family seat. What did the closed door show you about you?","When they said no, I learned..."],
["What's the first wrong impression strangers form of you — and what's actually underneath it?","People read me as one thing, but..."],
["Find the earliest scene — a room, an age, a face. Describe the scene before you describe the lesson.","I was young when I saw..."],
["A moment that split your life into before and after — that nobody around you clocked.","Nobody noticed, but after that day I..."],
["Replay the last time someone tried you. What did your body do first — before you chose anything?","Before I can even think, I..."],
["Go back to the last day it was all too much. Hour one — what did you actually do, not what you wish you'd done?","The last time it all hit, I..."],
["Pick your most recent real conflict, big or small. Replay it like film: the first thing you did, then the next.","It started when... and then I..."],
["What can a stranger do in sixty seconds that flips your switch?","The fastest way to lose me is..."],
["What makes you leave the room, or bite your tongue in half to stay in it?","I can't watch people..."],
["When life squeezes, where do you feel it first — jaw, shoulders, gut, chest? And what does it do there?","My stress goes straight to my..."],
["Think of a promise no one ever heard you make — one you've kept anyway, maybe for years.","I never told anybody, but I promised..."],
["What do you protect and honor that other people treat as ordinary?","Most people shrug at it, but to me..."],
["What would you stand in front of while the whole crowd booed you?","Call me wrong all day — I'm not moving on..."],
["What's the job you keep getting assigned that you never applied for?","Everyone expects me to be the one who..."],
["The last group you were in — what seat did you end up taking? Is it the one you'd choose?","I always end up as the..."],
["Which compliment lands as true instead of just polite? Who said it last?","I believe it when someone says I'm..."],
["What do people knock about you that you'd never trade away?","They call it a flaw; I call it..."],
["Be honest — whose life makes something in your chest tighten when it scrolls past? Name exactly what they have.","I'd never say it out loud, but I envy..."],
["Something true that nobody currently holds. You can pass this door — or set it down here. The mirror never glances at this page. It rides your thread unread — sealed until you choose to send.","What nobody knows is..."],
["Find the last laugh that hurt your ribs. Who was there, and what set it off?","The last time I couldn't stop laughing..."],
["What do you quietly hope someone gives you — safety, awe, being chosen, being seen?","What I really want to feel is..."],
["Blank page. No debts, no history, nobody watching. What's the first thing you build?","If nothing followed me, I'd build..."],
["You hold the pen for one law every soul must keep. Write the law.","The first law would be..."],
["Who left you tired after ten minutes lately? What exactly were they doing?","I'm drained by people who..."],
["Think of the most common mask you see people wearing every day.","Most people are pretending..."],
["What advice makes your eyes roll the second you hear it coming?","If one more person tells me to..."],
["Picture one face — just one — remembering you. Who is it, and what's the sentence they say?","I hope they say I..."],
["Not movie love — the realest picture you've ever held. What does it look like on an ordinary Tuesday?","Real love, to me, looks like..."]
];

/* ============ THE SIX ROOMS — thirty-three pages, walked as six doors ============ */
const MOVEMENTS=[
{name:"The Pull",    from:0,  to:4,  sig:"\u27B3", hex:"#C9A44C", line:"What draws you when nothing forces you."},
{name:"The Wound",   from:5,  to:8,  sig:"\u263E", hex:"#8F8A9E", line:"The rooms that shaped the lens."},
{name:"The Fire",    from:9,  to:14, sig:"\u25B3", hex:"#A34A2E", line:"How you move — and where it lives in your body."},
{name:"The Sacred",  from:15, to:17, sig:"\u2740", hex:"#4F7A5B", line:"What you'd guard with both hands."},
{name:"The Mask",    from:18, to:23, sig:"\u25CE", hex:"#4E8A83", line:"How the world casts you — and what stays backstage."},
{name:"The Longing", from:24, to:32, sig:"\u2726", hex:"#9B7FD4", line:"What the soul keeps asking for."}
];
const ROMAN=["I","II","III","IV","V","VI"];
function movementOf(i){ for(let m=0;m<MOVEMENTS.length;m++){ if(i>=MOVEMENTS[m].from && i<=MOVEMENTS[m].to) return m; } return 0; }

/* ============ STATE + THE ROOM REMEMBERS ============ */
let idx=0;
let draft={answers:Array(QUESTIONS.length).fill(""), glances:Array(QUESTIONS.length).fill(""), idx:0, started:Date.now()};
try{
  const saved=JSON.parse(localStorage.getItem(DRAFT_KEY));
  if(saved && Array.isArray(saved.answers) && saved.answers.length===QUESTIONS.length){
    draft=saved; idx=Math.min(saved.idx||0, QUESTIONS.length-1);
    if(!Array.isArray(draft.glances) || draft.glances.length!==QUESTIONS.length){
      draft.glances=Array(QUESTIONS.length).fill("");
    }
  }
}catch(e){}
function saveDraft(){
  if(LENS) draft.lens=LENS;
  draft.idx=idx;
  try{ localStorage.setItem(DRAFT_KEY, JSON.stringify(draft)); }catch(e){}
  saveThreadRemote();
}
const app=document.getElementById("app");
const lensglow=document.getElementById("lensglow");

/* ============ THE THREAD — pages that survive anything ============ */
const TOKEN_KEY="koil_thread_token";
const TWORDS=["EMBER","RIVER","STONE","TORCH","RAVEN","CEDAR","AMBER","ONYX","WILLOW","IRON","VELVET","ORCHID","FALCON","INDIGO","MARBLE","SABLE"];
let thread="";
try{ thread=localStorage.getItem(TOKEN_KEY)||""; }catch(e){}
if(!thread && !GATE_REQUIRED){
  thread="KOIL-"+TWORDS[Math.floor(Math.random()*TWORDS.length)]+"-"+(1000+Math.floor(Math.random()*9000));
  try{ localStorage.setItem(TOKEN_KEY, thread); }catch(e){}
}
const badge=document.createElement("div");
badge.className="threadbadge"; badge.textContent=thread?("Thread: "+thread):"";
document.body.appendChild(badge);
function checkThread(code, onDone){
  const cbName="koiC"+Date.now()%100000;
  let done=false;
  window[cbName]=function(data){ if(done)return; done=true; delete window[cbName]; onDone((data&&data.ok)?"ok":"no"); };
  const tag=document.createElement("script");
  tag.src=MIRROR_URL+"?mode=thread_check&callback="+cbName+"&token="+encodeURIComponent(code);
  tag.onerror=function(){ if(done)return; done=true; onDone("err"); };
  document.body.appendChild(tag);
  setTimeout(()=>{ if(done)return; done=true; onDone("err"); }, 15000);
}

let remoteTimer=null;
function saveThreadRemote(){
  clearTimeout(remoteTimer);
  remoteTimer=setTimeout(()=>{
    try{
      fetch(MIRROR_URL,{method:"POST",mode:"no-cors",keepalive:true,
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({mode:"thread_save", token:thread, draft:JSON.stringify(draft)})
      }).catch(()=>{});
    }catch(e){}
  }, 8000);
}
function loadThread(code, onDone){
  const cbName="koiT"+Date.now()%100000;
  let done=false;
  window[cbName]=function(data){ if(done)return; done=true; delete window[cbName]; onDone(data); };
  const tag=document.createElement("script");
  tag.src=MIRROR_URL+"?mode=thread_load&callback="+cbName+"&token="+encodeURIComponent(code);
  tag.onerror=function(){ if(done)return; done=true; onDone(null); };
  document.body.appendChild(tag);
  setTimeout(()=>{ if(done)return; done=true; onDone(null); }, 15000);
}

/* ===== PREFETCH — the mirror starts reading while they rest their thumbs ===== */
let pre={i:-1, text:"", promise:null};
function walkContext(qi){
  /* the last two written pages before this one — the mirror's short memory */
  let parts=[];
  for(let i=qi-1;i>=0 && parts.length<2;i--){
    if(i===SEALED) continue;
    const a=(draft.answers[i]||"").trim();
    if(!a) continue;
    let p="Q"+(i+1)+" "+QUESTIONS[i].slice(0,90)+" -> "+a.slice(0,220);
    if((draft.glances[i]||"").trim()) p+=" [mirror said: "+draft.glances[i].trim().slice(0,120)+"]";
    parts.unshift(p);
  }
  return parts.join(" || ").slice(0,900);
}
function glanceRequest(qi, ans){
  return new Promise(resolve=>{
    let done=false;
    const cbName="koiG"+Date.now()%100000;
    window[cbName]=function(data){ if(done)return; done=true; delete window[cbName];
      resolve((data&&data.line)?data.line:""); };
    const mv=MOVEMENTS[movementOf(qi)];
    const tag=document.createElement("script");
    tag.src=MIRROR_URL+"?mode=glance&callback="+cbName
      +"&n="+(qi+1)
      +"&room="+encodeURIComponent(mv.name)
      +"&q="+encodeURIComponent(QUESTIONS[qi].slice(0,300))
      +"&a="+encodeURIComponent(ans.slice(0,1200))
      +"&ctx="+encodeURIComponent((LENS?("Their Lens walk named their current lens: "+LENS+". "):"")+walkContext(qi));
    tag.onerror=function(){ if(done)return; done=true; resolve(""); };
    document.body.appendChild(tag);
    setTimeout(()=>{ if(done)return; done=true; resolve(""); }, 12000);
  });
}
const SEALED=23; /* the Secret — the mirror never glances at this page */
function prefetch(qi, ans){
  ans=(ans||"").trim();
  if(qi===SEALED) return;
  if(!ans || ans.length<60 || !MIRROR_URL) return;
  if(pre.i===qi && pre.text===ans) return; /* already cooking this exact page */
  pre={i:qi, text:ans, promise:glanceRequest(qi, ans)};
}

/* the walk passes through doors: entering a new room shows its threshold once per visit */
function gotoQ(){
  const m=movementOf(idx);
  if(m>seenMove){ seenMove=m; threshold(m); } else { renderQ(); }
}

function threshold(m){
  tintRoom(m);
  const mv=MOVEMENTS[m];
  const done=draft.answers.filter(a=>a&&a.trim()).length;
  const noticed = done>0 ? `The room notices: ${done} page${done===1?"":"s"} already carry your words.` :
    "The mirror reads each page as you finish it. Your thread holds your pages — read by no person unless you choose to open them at the end.";
  app.innerHTML=`
  <div class="stage">
    <div class="movecount">Room ${ROMAN[m]} of ${ROMAN.length}</div>
    <div class="movesig">${mv.sig}</div>
    <h1 style="font-size:30px">${mv.name}</h1>
    <p class="sub">${mv.line}</p>
    <p class="dim">${noticed}</p>
    <div id="tbtn"></div>
  </div>`;
  const b=document.createElement("button");
  b.className="gate-btn"; b.textContent="Enter";
  b.addEventListener("click", renderQ);
  document.getElementById("tbtn").appendChild(b);

  /* the mirror looks back at the room just walked */
  if(m>0 && MIRROR_URL){
    const prev=MOVEMENTS[m-1];
    let pages=[];
    for(let i=prev.from;i<=prev.to;i++){
      if(i===SEALED) continue;
      const a=(draft.answers[i]||"").trim();
      if(a) pages.push("Q"+(i+1)+": "+QUESTIONS[i].slice(0,90)+" -> "+a.slice(0,240));
    }
    if(pages.length>=2){
      const holder=document.createElement("div");
      holder.className="glancewrap";
      holder.innerHTML='<div class="gdots" id="rg">&middot; &middot; &middot;</div>';
      document.getElementById("tbtn").before(holder);
      const cbName="koiR"+Date.now()%100000;
      let rdone=false;
      window[cbName]=function(data){
        if(rdone) return; rdone=true; delete window[cbName];
        const rg=document.getElementById("rg");
        if(!rg) return;
        const line=(data&&data.line)?data.line:"";
        rg.parentElement.innerHTML=line?
          '<div class="glance"><p>'+line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</p></div>":"";
      };
      const tag=document.createElement("script");
      tag.src=MIRROR_URL+"?mode=roomglance&callback="+cbName
        +"&room="+encodeURIComponent(prev.name)
        +"&pages="+encodeURIComponent((LENS?("Their Lens walk named their current lens: "+LENS+".\n"):"")+pages.join(" || ").slice(0,2400));
      tag.onerror=function(){ window[cbName](null); };
      document.body.appendChild(tag);
      setTimeout(()=>{ window[cbName](null); }, 12000);
    }
  }
}

function renderQ(){

  function buildVoiceHelp(){

/* ============ THE GLANCE — after every written page, the mirror looks back ============ */
function glanceScreen(qi, ans, wasLast){
  const m=movementOf(qi); tintRoom(m);
  const mv=MOVEMENTS[m];
  app.innerHTML=`
  <div class="stage">
    <div class="movecount">${mv.name} &middot; page ${qi+1}</div>
    <div class="movesig">${mv.sig}</div>
    <div class="kicker">The mirror glances</div>
    <div class="glancewrap"><div class="gdots" id="gl">&middot; &middot; &middot;</div></div>
    <div id="gbtn"></div>
    <p class="dim foot">The glance sees only this page. The full reading weaves all thirty-three.</p>
  </div>`;
  const b=document.createElement("button");
  b.className="gate-btn";
  b.textContent=wasLast?"Finish the walk":"Next page";
  b.addEventListener("click", ()=>{ if(wasLast) finish(); else gotoQ(); });
  document.getElementById("gbtn").appendChild(b);

  function land(line){
    const gl=document.getElementById("gl");
    if(!gl) return;
    const wrap=gl.parentElement;
    if(line){
      draft.glances[qi]=line; saveDraft(); /* the room remembers its own words too */
      wrap.innerHTML='<div class="glance"><p>'+line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</p></div>";
    } else {
      wrap.innerHTML='<p class="dim">The mirror held this page for the full reading.</p>';
    }
  }
  /* already glanced at these exact words? show it instantly, spend nothing */
  if(draft.glances[qi] && draft.answers[qi] && draft.answers[qi].trim()===ans){
    land(draft.glances[qi]); return;
  }
  /* prefetched while they typed? ride the running request */
  const req=(pre.i===qi && pre.text===ans && pre.promise) ? pre.promise : glanceRequest(qi, ans);
  req.then(land);
}

function packRange(a,b){
  let out="";
  for(let i=a;i<=b;i++){
    out+="Q"+(i+1)+": "+QUESTIONS[i]+"\nA"+(i+1)+": "+((draft.answers[i]||"").trim()||"(left blank)")+"\n";
    if((draft.glances[i]||"").trim()) out+="Mirror glanced: "+draft.glances[i].trim()+"\n";
    out+="\n";
  }
  return out;
}
function packAnswers(){
  let out="";
  QUESTIONS.forEach((q,i)=>{
    out+="Q"+(i+1)+": "+q+"\nA"+(i+1)+": "+((draft.answers[i]||"").trim()||"(left blank)")+"\n";
    if((draft.glances[i]||"").trim()) out+="The mirror glanced: "+draft.glances[i].trim()+"\n";
    out+="\n";
  });
  return out;
}
function downloadCopy(){
  const blob=new Blob([packAnswers()],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="my-deep-mirror-answers.txt";
  document.body.appendChild(a); a.click(); a.remove();
}

let sending=false;

    fetch(WEBHOOK_URL,{method:"POST",mode:"no-cors",keepalive:true,headers:{"Content-Type":"text/plain"},

    setTimeout(()=>{

        body:JSON.stringify({email:email, gate:"DEEP MIRROR 2of2 thread:"+thread+tag,

    }).catch(()=>{});

}

function weaveReading(){
  app.innerHTML=`
  <div class="stage" style="min-height:60vh">
    <div class="kicker">The Soul Mirror</div>
    <div class="rule"></div>
    <div class="movesig" style="--mvc:#C9A44C;color:#C9A44C">\u2726</div>
    <h1 style="font-size:26px">The mirror is weaving.</h1>
    <p class="sub" style="animation:hintpulse 2s ease-in-out infinite">All thirty-three pages, read as one. This can take a few minutes — the mirror is reading everything you wrote, twice.</p>
  </div>`;
  let done=false;
  window.koiReadingCB=function(data){
    if(done) return; done=true;
    renderReading((data&&data.line)?data.line:"");
  };
  const tag=document.createElement("script");
  tag.src=MIRROR_URL+"?mode=reading&callback=koiReadingCB&token="+encodeURIComponent(thread);
  tag.onerror=function(){ if(done)return; done=true; renderReading(""); };
  document.body.appendChild(tag);
  setTimeout(()=>{ if(done)return; done=true; renderReading(""); }, 180000);
}

function mirrorSections(t){
  t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--gold)">$1</strong>');
  t=t.replace(/\*(.+?)\*/g,"<em>$1</em>");
  const lines=t.split(/\n/);
  const secs=[]; let cur={title:"",body:[]};
  lines.forEach(L=>{
    const h=L.match(/^#{2,4}\s*(.+)\s*$/);
    if(h){
      if(cur.title||cur.body.join("").trim()) secs.push(cur);
      cur={title:h[1].replace(/<[^>]+>/g,"").trim(),body:[]};
    } else if(/^\s*-{3,}\s*$/.test(L)){ }
    else cur.body.push(L);
  });
  secs.push(cur);
  return secs.filter(x=>x.title||x.body.join("").trim());
}
function rparas(bodyLines){
  return bodyLines.join("\n").split(/\n\n+/).map(p=>p.trim()).filter(Boolean)
    .map(p=>'<p class="body" style="text-align:left">'+p.replace(/\n/g,"<br>")+"</p>").join("");
}
function renderReading(line){
  let inner="";
  if(!line){
    inner=`<div class="rsec" style="--rd:.3s"><p class="body center">The mirror held its weaving this time — your pages are safe on your thread, nothing is lost. Take a breath and ask again.</p>
    <p class="center" style="margin-top:18px"><a class="gate-btn" href="#" id="reweave">Weave my reading</a></p>
    <p class="dim center">If the mirror holds twice, reply to your order email with your thread code — the weave will be run for you and sent back. Your pages stay unread by any person either way.</p></div>`;
  } else {
    const secs=mirrorSections(line);
    if(secs.length<=1){
      inner=`<div class="rsec" style="--rd:.3s">${rparas(secs.length?secs[0].body:[line])}</div>`;
    } else {
      inner=secs.map((sec,i)=>{
        const T=(sec.title||"").toUpperCase();
        const delay=(0.4+i*1.15).toFixed(2)+"s";
        let cls="", bodyHtml=rparas(sec.body);
        if(T.indexOf("ECHO")>-1) cls="recho";
        if(T.indexOf("QUESTION")>-1) cls="rquestion";
        if(T.indexOf("PICTURE")>-1) cls="rpicture";
        if(T.indexOf("LIGHT")>-1) cls="rlight";
        if(T.indexOf("SHADOW")>-1) cls="rshadow";
        if(T.indexOf("WALK")>-1||T.indexOf("JOURNEY")>-1){
          bodyHtml='<div class="rdoor">'+bodyHtml+
            '<a class="rwalk" href="/the-journeys">See the journeys &rarr;</a></div>';
        }
        return `<div class="rsec ${cls}" style="--rd:${delay}">`+
          (sec.title?`<div class="rtitle">${sec.title}</div>`:"")+bodyHtml+`</div>`;
      }).join("");
    }
  }
  app.innerHTML=`
  <div class="stage" style="max-width:640px;position:relative">
    <div class="rsig" style="color:#C9A44C">\u2726</div>
    <div class="kicker">The Soul Mirror &middot; your reading</div>
    <div class="rule"></div>
    ${inner}
    <div class="rule" style="margin:30px auto 22px"></div>
    <div class="rsec" style="--rd:${line?(0.4+ (mirrorSections(line).length)*1.15).toFixed(2)+"s":"1s"};text-align:center">
      <p class="dim">This reading exists once. It was built from thirty-three pages only you could have written, on the days you wrote them. Your pages and this thread remain yours — nothing is lost.</p>
      <p class="dim" id="witnessline"></p>
      <p class="dim"><a class="dl" id="rdl" href="#">Keep a copy of my pages on this device</a></p>
      <p class="dim foot">A reflection, not a verdict — you outrank the mirror. Not diagnosis or therapy; deep water deserves real support. In the U.S., call or text 988 any hour.<br><br><a href="/" style="color:#938BA6">Return to the corridor</a><br><br>&mdash; Kingdom of Inner Light</p>
    </div>
  </div>`;
  const wEl=document.getElementById("witnessline");
  if(wEl){
    try{
      const wc=(document.getElementById("witnessok")||{checked:false}).checked || window.__witnessok;
      if(wc) wEl.innerHTML='You opened the door: your pages travel to Mecca, and the <strong style="color:var(--gold)">Sacred Witness Session</strong> is yours to claim — reply to your order email to set the time. Your sealed page stays sealed.';
    }catch(e){}
  }
  const rdl=document.getElementById("rdl");
  if(rdl) rdl.addEventListener("click",(e)=>{ e.preventDefault(); downloadCopy(); });
  const rw=document.getElementById("reweave");
  if(rw) rw.addEventListener("click",(e)=>{ e.preventDefault(); weaveReading(); });
  window.scrollTo({top:0,behavior:"smooth"});
}

intro();
</script>

<script>
/* ===== KOIL SOUND — one soul for the whole kingdom ===== */
window.KOILSOUND=(function(){
  var ctx=null,filt=null,master=null,on=false,amb=[],chimeT=null,chordT=null,chordI=0;
  var CH=[[110,130.81,164.81],[87.31,110,130.81],[130.81,164.81,196],[98,123.47,146.83],[110,130.81,164.81],[82.41,123.47,164.81]];
  var NOTES=[523.25,587.33,659.25,783.99,880];
  function init(){
    if(!ctx){
      var AC=window.AudioContext||window.webkitAudioContext; if(!AC) return false;
      ctx=new AC();
      filt=ctx.createBiquadFilter(); filt.type="lowpass"; filt.frequency.value=420; filt.Q.value=0.6;
      master=ctx.createGain(); master.gain.value=0.55;
      filt.connect(master); master.connect(ctx.destination);
    }
    if(ctx.state==="suspended") ctx.resume();
    return true;
  }
  function tone(f,d,o){
    o=o||{}; if(!on||!init()) return;
    var t=ctx.currentTime+(o.delay||0);
    var osc=ctx.createOscillator(),g=ctx.createGain();
    osc.type=o.type||"sine"; osc.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(o.gain||0.07,t+(o.attack||0.012));
    g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    osc.connect(g); g.connect(o.dest||master); osc.start(t); osc.stop(t+d+0.05);
  }
  function chord(fs){
    if(!init()) return;
    var t=ctx.currentTime;
    fs.forEach(function(f,i){
      [["sine",0],["triangle",1.5]].forEach(function(w){
        var osc=ctx.createOscillator(),g=ctx.createGain();
        osc.type=w[0]; osc.frequency.value=f; osc.detune.value=w[1]+(i-1)*2;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.02,t+3);
        g.gain.setValueAtTime(0.02,t+7);
        g.gain.linearRampToValueAtTime(0.0001,t+11);
        osc.connect(g); g.connect(filt); osc.start(t); osc.stop(t+11.5);
      });
    });
  }
  var windGain=null,windTarget=0;
  function windOn(){
    if(!init()||windGain) return;
    var len=Math.floor(ctx.sampleRate*2),buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var src=ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    var bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=340; bp.Q.value=0.8;
    windGain=ctx.createGain(); windGain.gain.value=0;
    src.connect(bp); bp.connect(windGain); windGain.connect(master); src.start();
    amb.push(src);
    setInterval(function(){
      if(!windGain) return;
      var cur=windGain.gain.value;
      windGain.gain.linearRampToValueAtTime(cur+(windTarget-cur)*0.35,ctx.currentTime+0.12);
      windTarget*=0.82;
    },120);
  }
  function startAmb(){
    if(!init()||amb.length) return;
    var o=ctx.createOscillator(),g=ctx.createGain(),l=ctx.createOscillator(),lg=ctx.createGain();
    o.type="sine"; o.frequency.value=55; g.gain.value=0.03;
    l.type="sine"; l.frequency.value=0.07; lg.gain.value=0.012;
    l.connect(lg); lg.connect(g.gain); o.connect(g); g.connect(filt); o.start(); l.start();
    amb.push(o,l);
    windOn();
    var loop=function(){ if(on){ chord(CH[chordI%CH.length]); chordI++; chordT=setTimeout(loop,9000);} };
    loop();
    var chime=function(){
      if(!on) return;
      var f=NOTES[Math.floor(Math.random()*NOTES.length)]*(Math.random()<0.4?0.5:1);
      tone(f,2.6,{gain:0.02,attack:0.4});
      chimeT=setTimeout(chime,7000+Math.random()*12000);
    };
    chimeT=setTimeout(chime,4000);
  }
  function stopAmb(){
    clearTimeout(chimeT); clearTimeout(chordT);
    amb.forEach(function(n){ try{ n.stop?n.stop():n.disconnect(); }catch(e){} });
    amb=[]; windGain=null;
  }
  return {
    setOn:function(v){ on=v; if(v){ if(init()){ startAmb(); tone(659.25,0.35,{gain:0.06}); } } else stopAmb(); },
    isOn:function(){ return on; },
    ui:function(){ var f=460+Math.random()*140; tone(f,0.09,{gain:0.028,type:"triangle"}); tone(f*3.02,0.06,{gain:0.012,delay:0.01}); },
    door:function(){
      if(!on||!init()) return;
      var dur=0.55,t=ctx.currentTime;
      var len=Math.floor(ctx.sampleRate*dur),buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
      for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
      var src=ctx.createBufferSource(); src.buffer=buf;
      var bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.Q.value=1.1;
      bp.frequency.setValueAtTime(260,t); bp.frequency.exponentialRampToValueAtTime(1500,t+dur*0.8);
      var g=ctx.createGain();
      g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.045,t+0.06);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      src.connect(bp); bp.connect(g); g.connect(master); src.start(t);
      tone(110,0.4,{gain:0.04});
    },
    enter:function(){
      if(!on||!init()) return;
      var t=ctx.currentTime;
      [[55,110],[82.41,164.81]].forEach(function(p,i){
        var osc=ctx.createOscillator(),g=ctx.createGain();
        osc.type="sine"; osc.frequency.setValueAtTime(p[0],t);
        osc.frequency.exponentialRampToValueAtTime(p[1],t+1.5);
        g.gain.setValueAtTime(0.0001,t);
        g.gain.linearRampToValueAtTime(0.055-i*0.015,t+1.1);
        g.gain.exponentialRampToValueAtTime(0.0001,t+2.4);
        osc.connect(g); g.connect(filt); osc.start(t); osc.stop(t+2.6);
      });
      [659.25,783.99,1046.5].forEach(function(f,i){ tone(f,1.4,{gain:0.03,delay:0.9+i*0.18,attack:0.2}); });
    },
    deposit:function(){ tone(880,0.5,{gain:0.06}); tone(1318.5,0.7,{gain:0.045,delay:0.07}); },
    sting:function(){ tone(659.25,0.4,{gain:0.06}); tone(987.77,0.6,{gain:0.05,delay:0.1}); },
    level:function(){ [523.25,659.25,783.99,1046.5].forEach(function(f,i){ tone(f,0.55,{gain:0.06,delay:i*0.12}); }); },
    spark:function(){ tone(1567.98,0.9,{gain:0.045,attack:0.05}); tone(2093,1.1,{gain:0.03,delay:0.12,attack:0.06}); },
    tick:function(){ tone(440,0.12,{gain:0.03,type:"triangle"}); },
    wind:function(v){ windTarget=Math.min(0.06,Math.max(windTarget,v)); }
  };
})();

/* ===== wiring: toggle, ticks, page hooks ===== */
(function(){
  var S=window.KOILSOUND;
  /* the toggle glyph */
  var b=document.createElement("button");
  b.id="koilsnd"; b.textContent="\u266A";
  b.title="Wake the kingdom's sound";
  b.style.cssText="position:fixed;right:14px;bottom:12px;z-index:40;background:rgba(10,9,16,.55);border:1px solid rgba(147,139,166,.35);color:#5a5470;width:34px;height:34px;border-radius:50%;font-size:14px;cursor:pointer;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);transition:color .4s ease, box-shadow .4s ease";
  document.body.appendChild(b);
  function paint(){
    b.style.color=S.isOn()?"#C9A44C":"#5a5470";
    b.style.boxShadow=S.isOn()?"0 0 14px rgba(201,164,76,.4)":"none";
    b.title=S.isOn()?"The kingdom hums \u2014 tap for silence":"Wake the kingdom's sound";
  }
  b.addEventListener("click",function(e){
    e.stopPropagation();
    var v=!S.isOn();
    S.setOn(v);
    try{ localStorage.setItem("koil_sound",v?"1":"0"); }catch(err){}
    paint();
  });
  /* returning listener: sound wakes on first touch */
  var want=false;
  try{ want=localStorage.getItem("koil_sound")==="1"; }catch(e){}
  if(want){
    var arm=function(){ S.setOn(true); paint(); };
    window.addEventListener("pointerdown",arm,{once:true});
    window.addEventListener("touchstart",arm,{once:true});
  }
  /* every button and link ticks */
  document.addEventListener("pointerdown",function(e){
    if(e.target && e.target.closest && e.target.closest("button, a, .btn, .gate-btn, .rwalk, .dl")) S.ui();
  });
  /* page hooks by what exists */
  var isCorridor=!!document.querySelector(".station")||document.documentElement.scrollHeight>window.innerHeight*2;
  if(isCorridor){
    /* wind rises with the walk; stations and whispers announce themselves */
    var lastY=window.scrollY,lastT=performance.now();
    var stations=Array.prototype.slice.call(document.querySelectorAll(".station"));
    var states=stations.map(function(){ return false; });
    function step(){
      var y=window.scrollY,t=performance.now(),dt=Math.max(16,t-lastT);
      var v=Math.abs(y-lastY)/dt;              /* px per ms */
      if(v>0.05) S.wind(Math.min(0.06,v*0.045));
      lastY=y; lastT=t;
      var max=document.documentElement.scrollHeight-window.innerHeight;
      var p=max>0?y/max:0;
      stations.forEach(function(st,i){
        var c=parseFloat(st.dataset.c||"0");
        var w=st.classList.contains("whisper")?0.030:0.072;
        var onNow=Math.abs(p-c)<w;
        if(onNow&&!states[i]){
          if(st.classList.contains("whisper")) S.spark(); else S.sting();
        }
        states[i]=onNow;
      });
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  /* chamber + rite arrivals: glances chime, room-glances ring, the woven reading sings */
  var lastRsec=0;
  var mo=new MutationObserver(function(muts){
    for(var m=0;m<muts.length;m++){
      var added=muts[m].addedNodes;
      for(var i=0;i<added.length;i++){
        var n=added[i];
        if(!n.classList) continue;
        if(n.classList.contains("glance")){ S.deposit(); return; }
        if(n.classList.contains("roomglance")){ S.enter(); return; }
        if(n.classList.contains("rsec")){
          var now=Date.now();
          if(now-lastRsec>1500){ lastRsec=now; S.level(); }
          return;
        }
        if(n.querySelector && n.querySelector(".rsec")){
          var now2=Date.now();
          if(now2-lastRsec>1500){ lastRsec=now2; S.level(); }
          return;
        }
      }
    }
  });
  mo.observe(document.body,{childList:true,subtree:true});
})();
