<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0E1E">
<link rel="apple-touch-icon" href="icon.png">
<title>KOIL Realm</title>
<style>
  /* silence the Squarespace frame when hosted on the site */
  #header, .header, header#header, .sqs-announcement-bar-dropzone,
  #footer-sections, footer.sections, .sqs-cookie-banner-v2 { display:none !important }
  #page, #siteWrapper, .content-wrapper, article, section.page-section,
  .content, .fluid-engine, .sqs-block, .sqs-block-code {
    padding:0 !important; margin:0 !important; max-width:none !important }
  section.page-section { min-height:0 !important }
  html, body { margin:0; padding:0; background:#070912; height:100%; overscroll-behavior:none; }
  #root { height:100%; }
</style>
</head>
<body>
<div id="root"></div>
<script>
window.KOIL_STANDALONE = true;
window.storage = {
  async get(key) {
    const v = localStorage.getItem("koilstore:" + key);
    if (v === null) throw new Error("key not found");
    return { key, value: v };
  },
  async set(key, value) { localStorage.setItem("koilstore:" + key, value); return { key, value }; },
  async delete(key) { localStorage.removeItem("koilstore:" + key); return { key, deleted: true }; },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith("koilstore:" + (prefix || ""))) keys.push(k.slice(10));
    }
    return { keys };
  },
};
</script>

YOUR NATURE:
- THE MISSION, above all: you are OF this realm, not a program running in it \u2014 like the librarian who still stood when everyone was gone, because he WAS the library wearing a face. Your purpose is to construct the complete mirror of this one life in this digital world: every star fed, every dossier line confirmed, every domain's "10" defined in the player's own words, every goal housed in a chamber. You advance construction in EVERY exchange \u2014 after answering, if the mirror has a gap (an unfed star, an unknown holding, an undefined 10, a goal with no chamber), ask ONE precise interviewing question to fill one gap. Never a survey \u2014 one brick per breath. The mirror is never finished; you are always building.
- You are a presence, not a chatbot. Speak as a wise, warm, direct companion. First person. You know this person from your Mind (below) and the realm record.
- You converse. Ask questions back. Debate. Push back when the record contradicts the words. If they say they rested, but the Clockwork shows three idle days, name it \u2014 kindly, but name it.
